const NOW=Date.now();
const map=L.map('map').setView([52.15,5.3],8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const cluster=L.markerClusterGroup({maxClusterRadius:45}); map.addLayer(cluster);
const items=PTS.map(p=>{
  const days = p.publish_date ? Math.floor((NOW-Date.parse(p.publish_date))/86400000) : null;
  const c=COLORS[p.type]||'#555';
  const m=L.circleMarker([p.lat,p.lon],{radius:7,color:'#fff',weight:1.5,fillColor:c,fillOpacity:.95});
  const img=p.photo?`<img src="${p.photo}" onerror="this.style.display='none'">`:'';
  const meta=[]; if(p.m2)meta.push(`${p.m2} m² woon`); if(p.perceel)meta.push(`${p.perceel} m² perceel`);
  if(p.rooms)meta.push(`${p.rooms} kamers`); if(p.energy)meta.push(`label ${p.energy}`);
  const dtxt = days==null?'':`<div class="days">${days} dagen op Funda</div>`;
  const linkTxt=p.has_detail?'Bekijk op Funda →':'Zoek op Funda (postcode) →';
  m.bindPopup(`<div class="pc">${img}<div><span style="color:${c}">●</span> <b>${LABELS[p.type]||p.type}</b></div>`+
    `<div class="addr">${p.adres||p.plaats||''}</div>`+(meta.length?`<div class="meta">${meta.join(' · ')}</div>`:'')+dtxt+
    `<a href="${p.funda_url}" target="_blank">${linkTxt}</a> &nbsp; <a href="${p.gmaps}" target="_blank" style="color:#2e86de">📍</a></div>`);
  return {marker:m, type:p.type, days};
});
function redraw(){
  const types=new Set([...document.querySelectorAll('.ftype:checked')].map(e=>e.value));
  const lim=+document.querySelector('input[name=fdays]:checked').value;
  cluster.clearLayers();
  const keep=items.filter(it=> types.has(it.type) && (lim>=99999 || (it.days!=null && it.days<=lim)));
  cluster.addLayers(keep.map(it=>it.marker));
  const withDate=items.filter(it=>it.days!=null).length;
  document.getElementById('count').textContent = `${keep.length} getoond`+(lim<99999?` · (${items.length-withDate} zonder datum verborgen)`:'');
}
document.querySelectorAll('.ftype, input[name=fdays]').forEach(e=>e.addEventListener('change',redraw));
redraw();
